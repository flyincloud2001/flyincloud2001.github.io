name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.template.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      VITE_SUPABASE_URL: https://zstlvzvkbhhufbxpqvky.supabase.co
      VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzdGx2enZrYmhodWZieHBxdmt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMTU5ODIsImV4cCI6MjA5NDg5MTk4Mn0.9rZ_1cFMJH_nw2xHtdhGiwkeG38Ll_xzOU4c9wBeJiQ
      VITE_ADMIN_EMAIL: flyincloud2001@gmail.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run deploy

      - name: Commit and push built files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html 404.html assets/ robots.txt sitemap.xml favicon.svg
          if git diff --cached --quiet; then
            echo "No changes to deploy."
          else
            git commit -m "chore: auto deploy [skip ci]"
            git push
          fi
