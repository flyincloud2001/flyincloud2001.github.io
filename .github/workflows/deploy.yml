name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.template.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run deploy

      - name: Commit and push built files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html 404.html assets/ robots.txt sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes to deploy."
          else
            git commit -m "chore: auto deploy [skip ci]"
            git push
          fi
